name: "Onion Search guMCP Server"
icon: "assets/icon.jpeg"
description: "Wyszukiwanie i pobieranie stron .onion (Ahmia + Torch + extractor)"
documentation_path: "README.md"
tools:
  - name: "list_search_engines"
    description: "Lista obsługiwanych wyszukiwarek dark webu"
  - name: "search_ahmia"
    description: "Wyszukiwanie przez Ahmia (clearnet domyślnie, bez Tora)"
  - name: "search_dark_web"
    description: "Multi-engine wyszukiwanie (Ahmia + Torch przez Tor)"
  - name: "fetch_onion"
    description: "Pobiera tekst strony .onion przez Tor SOCKS5"
  - name: "check_onion_status"
    description: "Sprawdza dostępność adresu .onion"
  - name: "extract_onion_links"
    description: "Wyciąga adresy .onion v2/v3 z tekstu"
